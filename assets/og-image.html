<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=1200" />
  <title>ZXY OG Image</title>
  <link href="https://fonts.googleapis.com/css2?family=Oswald:wght@400;600&family=Raleway:wght@400;600;700&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    html, body {
      width: 1200px;
      height: 630px;
      overflow: hidden;
    }

    body {
      background: #000000;
      color: #ededed;
      font-family: 'Raleway', sans-serif;
      display: flex;
      flex-direction: column;
      justify-content: space-between;
      padding: 64px 72px;
      position: relative;
    }

    /* Grid decorativo de fondo */
    body::before {
      content: '';
      position: absolute;
      inset: 0;
      background-image:
        linear-gradient(rgba(255,255,255,0.03) 1px, transparent 1px),
        linear-gradient(90deg, rgba(255,255,255,0.03) 1px, transparent 1px);
      background-size: 60px 60px;
      pointer-events: none;
    }

    /* Brillo sutil en esquina superior derecha */
    body::after {
      content: '';
      position: absolute;
      top: -200px;
      right: -200px;
      width: 600px;
      height: 600px;
      background: radial-gradient(circle, rgba(255,255,255,0.04) 0%, transparent 70%);
      pointer-events: none;
    }

    .top {
      display: flex;
      align-items: center;
      gap: 12px;
      position: relative;
      z-index: 1;
    }

    .dot {
      width: 8px;
      height: 8px;
      background: #ffffff;
      border-radius: 50%;
    }

    .eyebrow {
      font-family: 'Raleway', sans-serif;
      font-weight: 700;
      font-size: 13px;
      letter-spacing: 3px;
      text-transform: uppercase;
      color: #555555;
    }

    .middle {
      position: relative;
      z-index: 1;
    }

    .logo {
      font-family: 'Oswald', sans-serif;
      font-weight: 600;
      font-size: 22px;
      letter-spacing: 1px;
      color: #a1a1a1;
      margin-bottom: 28px;
    }

    .logo span {
      color: #ffffff;
    }

    h1 {
      font-family: 'Oswald', sans-serif;
      font-weight: 600;
      font-size: 80px;
      line-height: 1.0;
      color: #ffffff;
      max-width: 820px;
    }

    h1 .accent {
      color: #ffffff;
    }

    h1 .dim {
      color: #333333;
    }

    .sub {
      margin-top: 24px;
      font-size: 20px;
      color: #555555;
      font-weight: 400;
      max-width: 640px;
      line-height: 1.6;
    }

    .sub strong {
      color: #a1a1a1;
      font-weight: 600;
    }

    .bottom {
      display: flex;
      align-items: center;
      justify-content: space-between;
      position: relative;
      z-index: 1;
      border-top: 1px solid #1a1a1a;
      padding-top: 28px;
    }

    .url {
      font-family: 'Oswald', sans-serif;
      font-size: 18px;
      font-weight: 400;
      color: #333333;
      letter-spacing: 1px;
    }

    .badge {
      font-family: 'Raleway', sans-serif;
      font-weight: 700;
      font-size: 11px;
      letter-spacing: 2.5px;
      text-transform: uppercase;
      color: #555555;
      border: 1px solid #1a1a1a;
      padding: 8px 16px;
      border-radius: 100px;
    }
  </style>
</head>
<body>

  <div class="top">
    <div class="dot"></div>
    <div class="eyebrow">Agentic Venture Studio · México · LatAm</div>
  </div>

  <div class="middle">
    <div class="logo"><span>ZXY</span> Ventures</div>
    <h1>
      <span class="dim">It's not</span><br>
      Venture Capital.<br>
      It's Venture Craft.
    </h1>
    <p class="sub">
      Construimos empresas que son imposibles<br>
      sin <strong>inteligencia artificial</strong>.
    </p>
  </div>

  <div class="bottom">
    <div class="url">zxy.vc</div>
    <div class="badge">Zone of eXponential Yields</div>
  </div>

</body>
</html>
